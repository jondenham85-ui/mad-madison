name: w2-frontend
on:
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p static
      - run: |
          cat > static/index.html << 'E'
          <!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>MADFaceShift AI - Best Face Swap App</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:#0a0a0f;color:#f0f0f0}header{padding:1rem 2rem;background:#0d0d1a;border-bottom:1px solid #1e1e3f;display:flex;justify-content:space-between;align-items:center}.logo{font-size:1.4rem;font-weight:900;background:linear-gradient(135deg,#7c3aed,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.hero{text-align:center;padding:4rem 1rem 2rem}.hero h1{font-size:clamp(2rem,5vw,3.5rem);font-weight:900;background:linear-gradient(135deg,#7c3aed,#06b6d4,#10b981);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:1rem}.hero p{color:#94a3b8;max-width:600px;margin:0 auto 2rem}.app{max-width:900px;margin:0 auto;padding:0 1rem 4rem}.uploads{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-bottom:1.5rem}@media(max-width:600px){.uploads{grid-template-columns:1fr}}.zone{border:2px dashed #374151;border-radius:1rem;padding:2rem;text-align:center;cursor:pointer;background:#111127;position:relative;min-height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:border-color .2s}.zone:hover,.zone.drag{border-color:#7c3aed}.zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}.zone img{max-width:100%;max-height:140px;border-radius:.5rem;object-fit:cover}.sbtn{background:linear-gradient(135deg,#7c3aed,#06b6d4);color:#fff;width:100%;border:none;padding:1rem;border-radius:.75rem;font-size:1.1rem;font-weight:700;cursor:pointer;margin-top:1rem}.sbtn:disabled{opacity:.5}.result{margin-top:1.5rem;display:none;text-align:center}.result img{max-width:100%;border-radius:1rem;border:2px solid #7c3aed}.dl{margin-top:1rem;display:inline-block;padding:.6rem 1.5rem;background:#7c3aed;color:#fff;border-radius:.5rem;text-decoration:none;font-weight:700}.err{background:#2d1515;border:1px solid #dc2626;border-radius:.75rem;padding:1rem;margin-top:1rem;color:#fca5a5;display:none}.loading{display:none;text-align:center;padding:2rem}.spin{width:48px;height:48px;border:4px solid #1e1e3f;border-top-color:#7c3aed;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 1rem}@keyframes spin{to{transform:rotate(360deg)}}.quota{text-align:center;color:#64748b;font-size:.85rem;margin-top:.5rem}.pricing{max-width:900px;margin:0 auto;padding:0 1rem 4rem;text-align:center}.pricing h2{font-size:2rem;margin-bottom:.5rem}.sub{color:#64748b;margin-bottom:2rem}.plans{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;text-align:left}@media(max-width:700px){.plans{grid-template-columns:1fr}}.plan{background:#111127;border:1px solid #1e1e3f;border-radius:1rem;padding:1.5rem;position:relative}.plan.pop{border-color:#7c3aed;box-shadow:0 0 30px rgba(124,58,237,.2)}.badge{position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#7c3aed,#06b6d4);color:#fff;font-size:.7rem;font-weight:700;padding:.2rem .9rem;border-radius:9999px}.pname{font-weight:700;margin-bottom:.25rem}.price{font-size:2rem;font-weight:900}.price span{font-size:.9rem;color:#64748b}.feats{list-style:none;margin:1rem 0}.feats li{padding:.3rem 0;color:#94a3b8;font-size:.9rem;border-bottom:1px solid #1e1e3f}.feats li:before{content:"v ";color:#10b981}.pbtn{width:100%;padding:.7rem;border-radius:.75rem;font-weight:700;border:none;cursor:pointer;margin-top:1rem;font-size:.95rem}.pfree{background:#1e1e3f;color:#f0f0f0}.ppro{background:linear-gradient(135deg,#7c3aed,#06b6d4);color:#fff}.pult{background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff}footer{text-align:center;padding:2rem;color:#374151;font-size:.85rem;border-top:1px solid #1e1e3f}</style></head><body><header><div class="logo">MADFaceShift AI</div><div style="color:#64748b">Self-Hosted AI</div></header><div class="hero"><h1>The Best Face Swap App on the Internet</h1><p>Upload your face plus any photo. Our self-hosted AI swaps faces instantly. Free to try, no signup needed.</p></div><div class="app"><div class="uploads"><div><p style="margin-bottom:.5rem;font-weight:600;color:#94a3b8">YOUR FACE</p><div class="zone" id="z1"><input type="file" accept="image/*" id="f1" onchange="preview(this,'p1')"><div id="p1"><div style="font-size:2.5rem">face</div><div style="color:#64748b;font-size:.9rem;margin-top:.5rem">Tap or drag your photo here</div></div></div></div><div><p style="margin-bottom:.5rem;font-weight:600;color:#94a3b8">TARGET IMAGE</p><div class="zone" id="z2"><input type="file" accept="image/*" id="f2" onchange="preview(this,'p2')"><div id="p2"><div style="font-size:2.5rem">img</div><div style="color:#64748b;font-size:.9rem;margin-top:.5rem">Tap or drag target photo here</div></div></div></div></div><button class="sbtn" id="swapBtn" onclick="doSwap()" disabled>Swap Faces Now</button><p class="quota">5 free swaps per day - No signup required - Instant results</p><div class="loading" id="loading"><div class="spin"></div><p style="color:#94a3b8">Swapping faces... about 20 seconds</p></div><div class="err" id="err"></div><div class="result" id="result"><img id="rImg" src="" alt="Swapped Result"><br><a id="dlLink" class="dl" download="MADFaceShift.jpg">Download Result</a></div></div><div class="pricing"><h2>Simple Pricing</h2><p class="sub">Start free. Upgrade when you need more.</p><div class="plans"><div class="plan"><div class="pname">Free</div><div class="price">$0<span>/mo</span></div><ul class="feats"><li>5 swaps per day</li><li>Standard quality</li><li>No signup needed</li></ul><button class="pbtn pfree" onclick="document.getElementById('f1').click()">Try Free Now</button></div><div class="plan pop"><div class="badge">MOST POPULAR</div><div class="pname">Pro</div><div class="price">$14.99<span>/mo</span></div><ul class="feats"><li>100 swaps per day</li><li>HD quality output</li><li>Priority processing</li><li>Cancel anytime</li></ul><button class="pbtn ppro" onclick="sub('pro')">Get Pro</button></div><div class="plan"><div class="pname">Ultimate</div><div class="price">$29.99<span>/mo</span></div><ul class="feats"><li>Unlimited swaps</li><li>Max quality output</li><li>Fastest processing</li><li>Cancel anytime</li></ul><button class="pbtn pult" onclick="sub('ultimate')">Go Ultimate</button></div></div></div><footer><p>2026 MADFaceShift AI - The best face swap app on the internet</p></footer><script>let f1=null,f2=null;function preview(inp,pid){const file=inp.files[0];if(!file)return;pid==='p1'?f1=file:f2=file;const r=new FileReader();r.onload=e=>{document.getElementById(pid).innerHTML='<img src="'+e.target.result+'">';};r.readAsDataURL(file);document.getElementById('swapBtn').disabled=!(f1&&f2);}async function doSwap(){if(!f1||!f2)return;const btn=document.getElementById('swapBtn');btn.disabled=true;document.getElementById('loading').style.display='block';document.getElementById('result').style.display='none';document.getElementById('err').style.display='none';const fd=new FormData();fd.append('source',f1);fd.append('target',f2);try{const r=await fetch('/api/v1/swap',{method:'POST',body:fd});const d=await r.json();if(!r.ok)throw new Error(d.detail||'Swap failed');document.getElementById('rImg').src=d.result_url;document.getElementById('dlLink').href=d.result_url;document.getElementById('result').style.display='block';}catch(e){const el=document.getElementById('err');el.textContent=e.message;el.style.display='block';}finally{document.getElementById('loading').style.display='none';btn.disabled=false;}}async function sub(plan){try{const r=await fetch('/api/v1/subscriptions/create',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({plan})});const d=await r.json();if(d.approval_url)window.location.href=d.approval_url;else alert('Error: '+JSON.stringify(d));}catch(e){alert(e.message);}}document.querySelectorAll('.zone').forEach(el=>{el.addEventListener('dragover',e=>{e.preventDefault();el.classList.add('drag')});el.addEventListener('dragleave',()=>el.classList.remove('drag'));el.addEventListener('drop',e=>{e.preventDefault();el.classList.remove('drag');const f=e.dataTransfer.files[0];if(!f)return;const inp=el.querySelector('input');const dt=new DataTransfer();dt.items.add(f);inp.files=dt.files;inp.dispatchEvent(new Event('change'));});});</script></body></html>
          E
      - run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -A
          git diff --staged --quiet || git commit -m "feat: add index.html"
          git push
