name: w4 - Index v2 (OG Tags + Viral Share Button)
on:
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write index.html part 1
        run: |
          cat > static/index.html << 'HTMLEOF'
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MADFaceShift AI - Swap Faces Instantly with
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0d0d0f;--surface:#16161a;--border:#2a2a35;--accent:#7c3aed;--accent2:#ec4899;--text:#f1f1f3;--muted:#888;--radius:14px}
    body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
    nav{display:flex;align-items:center;justify-content:space-between;padding:18px 32px;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(13,13,15,.92);backdrop-filter:blur(12px);z-index:100}
    .logo{font-size:1.4rem;font-weight:800;background:linear-gradient(90deg,#7c3aed,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .nav-links a{color:var(--muted);text-decoration:none;margin-left:24px;font-size:.9rem;transition:color .2s}
    .nav-links a:hover{color:var(--text)}
    .hero{text-align:center;padding:80px 20px 48px}
    .hero h1{font-size:clamp(2rem,5vw,3.8rem);font-weight:900;line-height:1.15;margin-bottom:20px}
    .hero h1 span{background:linear-gradient(90deg,#7c3aed,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .hero p{font-size:1.15rem;color:var(--muted);max-width:560px;margin:0 auto 36px;line-height:1.65}
    .badge{display:inline-block;background:rgba(124,58,237,.18);border:1px solid rgba(124,58,237,.4);color:#c4b5fd;padding:6px 16px;border-radius:999px;font-size:.8rem;font-weight:600;margin-bottom:24px;letter-spacing:.04em}
    .tool{max-width:900px;margin:0 auto;padding:0 20px 80px}
    .upload-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
    @media(max-width:600px){.upload-grid{grid-template-columns:1fr}}
    .upload-zone{background:var(--surface);border:2px dashed var(--border);border-radius:var(--radius);padding:40px 20px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;position:relative;overflow:hidden;min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center}
    .upload-zone:hover{border-color:var(--accent);background:rgba(124,58,237,.06)}
    .upload-zone.has-file{border-style:solid;border-color:var(--accent)}
    .upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
    .upload-zone img.preview{max-width:100%;max-height:160px;border-radius:8px;object-fit:cover}
    .upload-icon{font-size:2.5rem;margin-bottom:12px}
    .upload-label{font-size:.85rem;color:var(--muted);margin-top:8px}
    .upload-zone h3{font-size:1rem;font-weight:700;margin-bottom:6px}
    .btn-swap{width:100%;padding:18px;font-size:1.1rem;font-weight:800;border:none;border-radius:var(--radius);background:linear-gradient(90deg,#7c3aed,#ec4899);color:#fff;cursor:pointer;transition:opacity .2s,transform .15s;letter-spacing:.02em;margin-bottom:28px}
    .btn-swap:hover{opacity:.9;transform:translateY(-1px)}
    .btn-swap:disabled{opacity:.5;cursor:not-allowed;transform:none}
    .result-box{display:none;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;text-align:center}
    .result-box img{max-width:100%;border-radius:10px;margin-bottom:16px}
    .btn-dl{display:inline-block;padding:12px 28px;background:linear-gradient(90deg,#7c3aed,#ec4899);color:#fff;border-radius:8px;text-decoration:none;font-weight:700;font-size:.95rem}
    .status-msg{text-align:center;color:var(--muted);font-size:.9rem;min-height:24px;margin-bottom:16px}
    .status-msg.error{color:#f87171}
    .pricing{background:var(--surface);border-top:1px solid var(--border);padding:80px 20px}
    .pricing h2{text-align:center;font-size:2.2rem;font-weight:900;margin-bottom:12px}
    .pricing .sub{text-align:center;color:var(--muted);margin-bottom:52px}
    .plans{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:24px;max-width:900px;margin:0 auto}
    .plan{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:32px 28px;display:flex;flex-direction:column;transition:border-color .2s,transform .2s}
    .plan:hover{border-color:var(--accent);transform:translateY(-4px)}
    .plan.popular{border-color:var(--accent);position:relative}
    .plan.popular::before{content:'MOST POPULAR';position:absolute;top:-14px;left:50%;transform:translateX(-50%);background:linear-gradient(90deg,#7c3aed,#ec4899);color:#fff;padding:4px 16px;border-radius:999px;font-size:.7rem;font-weight:800;letter-spacing:.06em}
    .plan h3{font-size:1.2rem;font-weight:800;margin-bottom:8px}
    .plan .price{font-size:2.4rem;font-weight:900;margin:12px 0}
    .plan .price span{font-size:1rem;color:var(--muted);font-weight:400}
    .plan ul{list-style:none;margin:20px 0 28px;flex:1}
    .plan ul li{padding:6px 0;font-size:.9rem;color:var(--muted)}
    .plan ul li::before{content:'checkmark ';color:#a78bfa;font-weight:700}
    .btn-plan{padding:14px;border-radius:10px;font-weight:700;font-size:.95rem;cursor:pointer;border:none;text-align:center;transition:opacity .2s}
    .btn-plan.outline{background:transparent;border:2px solid var(--border);color:var(--text)}
    .btn-plan.outline:hover{border-color:var(--accent)}
    .btn-plan.filled{background:linear-gradient(90deg,#7c3aed,#ec4899);color:#fff}
    .btn-plan.filled:hover{opacity:.88}
<body>
<nav>
  <div class="logo">MADFaceShift AI</div>
  <div class="nav-links"><a href="#tool">Try It</a><a href="#pricing">Pricing</a></div>
</nav>
<section class="hero">
  <div class="badge">Powered by AI - No Account Required</div>
  <h1>Swap Any Face with <span>Hyper-Realistic AI</span></h1>
  <p>Upload two photos - your face lands on any image in seconds. Free to try. Used by thousands worldwide.</p>
</section>
<section class="tool" id="tool">
  <div class="upload-grid">
    <div class="upload-zone" id="zoneSource"><input type="file" id="fileSource" accept="image/*"><div class="upload-icon">&#x1F933;</div><h3>Your Face</h3><p class="upload-label">Clear front-facing photo works best</p></div>
    <div class="upload-zone" id="zoneTarget"><input type="file" id="fileTarget" accept="image/*"><div class="upload-icon">&#x1F5BC;</div><h3>Target Photo</h3><p class="upload-label">Any photo you want your face placed on</p></div>
  </div>
  <div class="status-msg" id="statusMsg"></div>
  <button class="btn-swap" id="swapBtn" onclick="doSwap()">Swap Faces Now - Free</button>
  <div class="result-box" id="resultBox"><img id="resultImg" src="" alt="Face Swap Result"><br><a class="btn-dl" id="dlLink" download="madfaceshift-result.jpg">Download Result</a></div>
</section>
<section class="pricing" id="pricing">
  <h2>Simple Pricing</h2><p class="sub">Start free. Upgrade when you need more.</p>
  <div class="plans">
    <div class="plan"><h3>Free</h3><div class="price">$0<span>/mo</span></div><ul><li>5 swaps per day</li><li>Standard quality</li><li>No account needed</li><li>Watermark-free</li></ul><button class="btn-plan outline" onclick="document.getElementById('tool').scrollIntoView({behavior:'smooth'})">Try Free</button></div>
    <div class="plan popular"><h3>Pro</h3><div class="price">$14.99<span>/mo</span></div><ul><li>Unlimited swaps</li><li>HD quality output</li><li>Priority processing</li><li>Email support</li></ul><button class="btn-plan filled" onclick="startSubscription('pro')">Get Pro</button></div>
    <div class="plan"><h3>Ultimate</h3><div class="price">$29.99<span>/mo</span></div><ul><li>Everything in Pro</li><li>4K ultra quality</li><li>Batch processing</li><li>API access</li><li>Priority support</li></ul><button class="btn-plan filled" onclick="startSubscription('ultimate')">Go Ultimate</button></div>
  </div>
</section>
<footer><p>2026 MADFaceShift AI - <a href="#">Terms</a> - <a href="#">Privacy</a></p></footer>
<button id="shareBtn" onclick="shareApp()">Share and Go Viral</button>
<script>
function setupZone(inputId,zoneId){const input=document.getElementById(inputId);const zone=document.getElementById(zoneId);input.addEventListener('change',function(){if(this.files&&this.files[0]){const reader=new FileReader();reader.onload=e=>{zone.innerHTML='';const img=document.createElement('img');img.classList.add('preview');img.src=e.target.result;zone.appendChild(img);zone.classList.add('has-file');const ni=document.createElement('input');ni.type='file';ni.id=inputId;ni.accept='image/*';ni.style.cssText='position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%';ni.addEventListener('change',function(){setupZone(inputId,zoneId)});zone.appendChild(ni)};reader.readAsDataURL(this.files[0])}})}
setupZone('fileSource','zoneSource');setupZone('fileTarget','zoneTarget');
async function doSwap(){const src=document.getElementById('fileSource');const tgt=document.getElementById('fileTarget');const btn=document.getElementById('swapBtn');const msg=document.getElementById('statusMsg');const box=document.getElementById('resultBox');if(!src.files[0]||!tgt.files[0]){msg.textContent='Please upload both photos first.';msg.className='status-msg error';return}btn.disabled=true;btn.textContent='Swapping faces...';msg.textContent='AI is working its magic...';msg.className='status-msg';box.style.display='none';try{const form=new FormData();form.append('source',src.files[0]);form.append('target',tgt.files[0]);const res=await fetch('/api/v1/swap',{method:'POST',body:form});const data=await res.json();if(!res.ok)throw new Error(data.detail||'Swap failed');const imgSrc='data:image/jpeg;base64,'+data.result;document.getElementById('resultImg').src=imgSrc;document.getElementById('dlLink').href=imgSrc;box.style.display='block';msg.textContent='Done! Download your result.';box.scrollIntoView({behavior:'smooth'})}catch(e){msg.textContent=e.message||'Something went wrong.';msg.className='status-msg error'}finally{btn.disabled=false;btn.textContent='Swap Faces Now - Free'}}
async function startSubscription(tier){try{const res=await fetch('/api/v1/subscriptions/create',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({tier})});const data=await res.json();if(data.approval_url)window.location.href=data.approval_url;else alert('Could not start checkout.')}catch(e){alert('Network error.')}}
function shareApp(){const url='https://mad-madison-production.up.railway.app/';const text='This AI face swap is INSANE - free to use, results in seconds! Try MADFaceShift AI';if(navigator.share){navigator.share({title:'MADFaceShift AI',text,url}).catch(()=>{})}else{window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(text)+'&url='+encodeURIComponent(url),'_blank')}}
</script>
</body></html>
HTMLEOF

      - name: Commit and push
